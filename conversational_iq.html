<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversational IQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFFFFF;--text:#1A1A1A;--muted:#6B6860;--border:rgba(0,0,0,0.09);--shadow:0 2px 24px rgba(0,0,0,0.07);--D:#B83232;--I:#1A6FA8;--S:#1A7A42;--C:#5E2D8A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:2.5rem 1rem 5rem;}
.card{background:var(--surface);border-radius:22px;box-shadow:var(--shadow);width:100%;max-width:580px;padding:2.75rem 2.75rem 2.25rem;border:1px solid var(--border);}
.intro{text-align:center;}
.brand{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:2.25rem;}
.intro h1{font-family:'DM Serif Display',serif;font-size:40px;font-weight:400;line-height:1.12;margin-bottom:1rem;}
.intro p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:2rem;}
.disc-row{display:flex;justify-content:center;gap:1.75rem;margin-bottom:2.5rem;}
.disc-dot{display:flex;flex-direction:column;align-items:center;gap:6px;}
.disc-dot .dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:15px;color:#fff;}
.disc-dot span{font-size:11px;color:var(--muted);}
.btn-primary{background:var(--text);color:#fff;border:none;border-radius:50px;padding:14px 44px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:0.02em;transition:opacity 0.15s,transform 0.12s;}
.btn-primary:hover{opacity:0.82;transform:translateY(-1px);}
.prog-wrap{margin-bottom:2.25rem;}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.prog-count{font-size:12px;color:var(--muted);}
.prog-track{height:2px;background:rgba(0,0,0,0.08);border-radius:2px;}
.prog-fill{height:100%;background:var(--text);border-radius:2px;transition:width 0.4s ease;}
.q-eyebrow{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.65rem;}
.q-text{font-family:'DM Serif Display',serif;font-size:27px;font-weight:400;line-height:1.3;margin-bottom:1.75rem;}
.options{display:grid;gap:10px;margin-bottom:2rem;}
.opt{background:transparent;border:1px solid var(--border);border-radius:13px;padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:13px;transition:all 0.14s;position:relative;overflow:hidden;}
.opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background 0.14s;}
.opt:hover{background:rgba(0,0,0,0.025);border-color:rgba(0,0,0,0.18);}
.opt.sel{border-color:var(--text);background:rgba(0,0,0,0.025);}
.opt.sel::before{background:var(--text);}
.opt-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.18);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.14s;}
.opt.sel .opt-circle{background:var(--text);border-color:var(--text);}
.opt.sel .opt-circle::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;}
.nav{display:flex;align-items:center;}
.btn-back{background:transparent;border:1px solid var(--border);border-radius:50px;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;transition:all 0.14s;}
.btn-back:hover{border-color:rgba(0,0,0,0.22);color:var(--text);}
.btn-next{background:var(--text);border:none;border-radius:50px;padding:11px 28px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#fff;cursor:pointer;margin-left:auto;transition:all 0.14s;}
.btn-next:hover:not(:disabled){opacity:0.82;transform:translateY(-1px);}
.btn-next:disabled{opacity:0.22;cursor:not-allowed;transform:none;}
.result{animation:fadeUp 0.45s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-eyebrow{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:0.5rem;}
.arch-name{font-family:'DM Serif Display',serif;font-size:42px;font-weight:400;text-align:center;margin-bottom:0.3rem;}
.arch-code{display:inline-flex;font-size:12px;font-weight:500;letter-spacing:0.08em;padding:4px 14px;border-radius:20px;border:1px solid var(--border);color:var(--muted);margin-bottom:1.5rem;}
.result-top{display:flex;flex-direction:column;align-items:center;margin-bottom:2rem;}
.dual-note{background:#FAFAF7;border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:1.75rem;}
.dual-note strong{color:var(--text);font-weight:500;}
.radar-wrap{display:flex;justify-content:center;margin-bottom:1.75rem;}
.score-bars{margin-bottom:2rem;}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.score-k{width:16px;font-size:13px;font-weight:500;}
.score-track{flex:1;height:5px;background:rgba(0,0,0,0.07);border-radius:3px;overflow:hidden;}
.score-bar{height:100%;border-radius:3px;transition:width 0.7s ease;}
.score-pct{width:34px;font-size:13px;color:var(--muted);text-align:right;}
.divider{border:none;border-top:1px solid var(--border);margin:2rem 0;}
.section{margin-bottom:2rem;}
.section-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;}
.arch-desc{font-size:15px;line-height:1.75;color:var(--text);}
.frase{font-family:'DM Serif Display',serif;font-size:21px;font-style:italic;line-height:1.4;color:var(--text);border-left:3px solid var(--text);padding-left:1.25rem;margin:1rem 0 0;}
.bullets{list-style:none;display:flex;flex-direction:column;gap:8px;}
.bullets li{display:flex;gap:10px;font-size:15px;line-height:1.6;color:var(--text);}
.bullets li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--text);flex-shrink:0;margin-top:8px;}
.bullets.warn li::before{background:#B83232;}
.energy-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.energy-card{background:#FAFAF7;border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;}
.energy-card .ec-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem;}
.energy-card ul{list-style:none;display:flex;flex-direction:column;gap:5px;}
.energy-card ul li{font-size:13px;line-height:1.5;color:var(--text);display:flex;gap:7px;}
.energy-card ul li::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:7px;}
.energy-card.up ul li::before{background:var(--S);}
.energy-card.down ul li::before{background:var(--D);}
.rel-grid{display:grid;gap:10px;}
.rel-row{display:flex;gap:12px;align-items:flex-start;}
.rel-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0;margin-top:2px;}
.rel-text{font-size:14px;line-height:1.6;color:var(--text);}
.rel-text strong{font-weight:500;}
.pill-row{display:flex;flex-wrap:wrap;gap:7px;}
.pill{font-size:13px;padding:5px 13px;border-radius:20px;border:1px solid var(--border);color:var(--text);}
.btn-restart{background:transparent;border:1px solid var(--border);border-radius:50px;padding:11px 28px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;display:block;margin:2rem auto 0;transition:all 0.14s;}
.btn-restart:hover{border-color:rgba(0,0,0,0.25);color:var(--text);}
@media(max-width:480px){.card{padding:1.75rem 1.5rem 1.5rem;}.q-text{font-size:22px;}.arch-name{font-size:32px;}.energy-grid{grid-template-columns:1fr;}}
</style>
</head>

let screen='intro',cur=0,ans=new Array(28).fill(null);

function scores(){
  const s={D:0,I:0,S:0,C:0};
  ans.forEach((a,i)=>{if(a!==null)s[Q[i].o[a].d]++;});
  return s;
}

function getArch(){
  const s=scores();
  const sorted=Object.entries(s).sort((a,b)=>b[1]-a[1]);
  const t1=sorted[0][0],t2=sorted[1][0];
  const d1=sorted[0][1],d2=sorted[1][1];
  const diff=d1-d2;
  let arch,dual=false;
  if(diff>=5){arch=t1;}
  else if(diff>=2){arch=t1+t2.toLowerCase();}
  else{arch=t1+t2;dual=true;}
  if(!A[arch]){
    if(A[t1+t2])arch=t1+t2;
    else if(A[t2+t1])arch=t2+t1;
    else arch=t1;
  }
  return{arch,dual,top1:t1,top2:t2,diff};
}

function radarSVG(s,archColor){
  const total=Object.values(s).reduce((a,b)=>a+b,0)||1;
  const cx=130,cy=130,maxR=90;
  const corners=[{k:'D',a:-90},{k:'I',a:0},{k:'S',a:90},{k:'C',a:180}];
  const pts=corners.map(c=>{const r=(s[c.k]/total)*maxR+16,rad=c.a*Math.PI/180;return[cx+r*Math.cos(rad),cy+r*Math.sin(rad)];});
  const poly=pts.map(p=>p.map(v=>v.toFixed(1)).join(',')).join(' ');
  const gC=[25,50,70,90].map(r=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>`).join('');
  const ax=`<line x1="${cx}" y1="${cy-98}" x2="${cx}" y2="${cy+98}" stroke="rgba(0,0,0,0.07)" stroke-width="1"/><line x1="${cx-98}" y1="${cy}" x2="${cx+98}" y2="${cy}" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>`;
  const lbls=[{k:'D',x:cx,y:cy-110,c:COLORS.D},{k:'I',x:cx+112,y:cy,c:COLORS.I},{k:'S',x:cx,y:cy+114,c:COLORS.S},{k:'C',x:cx-112,y:cy,c:COLORS.C}];
  const pcts=corners.map(c=>Math.round(s[c.k]/total*100));
  const lt=lbls.map((l,i)=>`<text x="${l.x}" y="${l.y}" text-anchor="middle" dominant-baseline="middle" font-family="DM Sans,sans-serif" font-size="12" font-weight="500" fill="${l.c}">${l.k} ${pcts[i]}%</text>`).join('');
  const dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" fill="${archColor}"/>`).join('');
  return`<svg viewBox="0 0 260 260" width="200" height="200">${gC}${ax}<polygon points="${poly}" fill="${archColor}" fill-opacity="0.15" stroke="${archColor}" stroke-width="2"/>${dots}${lt}</svg>`;
}

function dualNote(t1,t2,diff){
  const n1=A[t1]?.name||t1,n2=A[t2]?.name||t2;
  const int=diff<=1?"casi idéntica fuerza":"fuerza muy similar";
  return`<div class="dual-note"><strong>Tienes dos dimensiones igualmente dominantes.</strong> Presentas ${int} en <strong>${t1} (${n1})</strong> y <strong>${t2} (${n2})</strong>. Esto indica que adaptas tu estilo según el contexto: bajo presión o ante retos nuevos, probablemente emerge más el lado <strong>${t1}</strong>; en entornos de confianza o colaboración, aparece más el <strong>${t2}</strong>. Esa flexibilidad no es inconsistencia — es una ventaja real.</div>`;
}

function renderIntro(){
  return`<div class="intro"><div class="brand">Conversational IQ · Umbra Consulting</div><h1>Descubre tu estilo<br>de personalidad</h1><p>28 preguntas · Aproximadamente 5 minutos<br>Responde según cómo eres,<br>no como quisieras ser.</p><div class="disc-row"><div class="disc-dot"><div class="dot" style="background:${COLORS.D}">D</div><span>Dominance</span></div><div class="disc-dot"><div class="dot" style="background:${COLORS.I}">I</div><span>Influence</span></div><div class="disc-dot"><div class="dot" style="background:${COLORS.S}">S</div><span>Steadiness</span></div><div class="disc-dot"><div class="dot" style="background:${COLORS.C}">C</div><span>Conscientiousness</span></div></div><button class="btn-primary" onclick="start()">Comenzar →</button></div>`;
}

function renderTest(){
  const q=Q[cur],pct=Math.round(cur/28*100);
  return`<div><div class="prog-wrap"><div class="prog-meta"><span class="prog-label">Conversational IQ</span><span class="prog-count">${cur+1} / 28</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div><div class="q-eyebrow">Pregunta ${cur+1}</div><div class="q-text">${q.t}</div><div class="options">${q.o.map((o,i)=>`<button class="opt${ans[cur]===i?' sel':''}" onclick="pick(${i})"><span class="opt-circle"></span>${o.l}</button>`).join('')}</div><div class="nav">${cur>0?`<button class="btn-back" onclick="back()">← Atrás</button>`:'<span></span>'}<button class="btn-next" onclick="next()" ${ans[cur]===null?'disabled':''}>${cur===27?'Ver resultado →':'Siguiente →'}</button></div></div>`;
}

function renderResult(){
  const s=scores(),{arch,dual,top1,top2,diff}=getArch();
  const info=A[arch]||A[top1]||A['D'];
  const total=Object.values(s).reduce((a,b)=>a+b,0)||1;
  const bars=['D','I','S','C'].map(k=>{const pct=Math.round(s[k]/total*100);return`<div class="score-row"><span class="score-k" style="color:${COLORS[k]}">${k}</span><div class="score-track"><div class="score-bar" style="width:${pct}%;background:${COLORS[k]}"></div></div><span class="score-pct">${pct}%</span></div>`;}).join('');
  const relRows=info.relaciones.map(r=>`<div class="rel-row"><div class="rel-badge" style="background:${COLORS[r.k]}">${r.k}</div><div class="rel-text">${r.txt}</div></div>`).join('');
  return`<div class="result"><div class="result-top"><div class="result-eyebrow">Tu perfil Conversational IQ</div><div class="arch-name" style="color:${info.color}">${info.name}</div><span class="arch-code">${info.code}</span></div>${dual?dualNote(top1,top2,diff):''}<div class="radar-wrap">${radarSVG(s,info.color)}</div><div class="score-bars">${bars}</div><hr class="divider"><div class="section"><div class="section-label">Tu arquetipo</div><p class="arch-desc">${info.desc}</p><p class="frase">${info.frase}</p></div><hr class="divider"><div class="section"><div class="section-label">Áreas de fortaleza</div><ul class="bullets">${info.fortalezas.map(f=>`<li>${f}</li>`).join('')}</ul></div><div class="section"><div class="section-label">Puntos ciegos</div><ul class="bullets warn">${info.ciegos.map(c=>`<li>${c}</li>`).join('')}</ul></div><div class="section"><div class="section-label">Cómo trabajas mejor / qué te drena</div><div class="energy-grid"><div class="energy-card up"><div class="ec-label">Te energiza</div><ul>${info.energiza.map(e=>`<li>${e}</li>`).join('')}</ul></div><div class="energy-card down"><div class="ec-label">Te drena</div><ul>${info.drena.map(e=>`<li>${e}</li>`).join('')}</ul></div></div></div><div class="section"><div class="section-label">Cómo te relacionas con otros estilos</div><div class="rel-grid">${relRows}</div></div><div class="section"><div class="section-label">Rasgos principales</div><div class="pill-row">${info.traits.map(t=>`<span class="pill">${t}</span>`).join('')}</div></div><button class="btn-restart" onclick="restart()">Reiniciar test</button></div>`;
}

function render(){const app=document.getElementById('app');if(screen==='intro')app.innerHTML=renderIntro();else if(screen==='test')app.innerHTML=renderTest();else app.innerHTML=renderResult();}
function start(){screen='test';cur=0;render();}
function pick(i){ans[cur]=i;render();}
function next(){if(ans[cur]===null)return;if(cur===27){screen='result';render();return;}cur++;render();}
function back(){if(cur>0){cur--;render();}}
function restart(){screen='intro';cur=0;ans=new Array(28).fill(null);render();}
render();
</script>
</body>
</html>
